<button class="cabinet-menu-fab d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#cabinetOffcanvas" aria-controls="cabinetOffcanvas" aria-label="Открыть меню">
  <i class="bi bi-list"></i>
</button>

<div class="cabinet-sidebar card bg-dark neon-border-blue shadow-lg h-100 d-none d-lg-block">
  <div class="card-body p-0">
    <div class="border-bottom border-secondary border-opacity-25 p-4">
      <div class="d-flex align-items-center gap-3">
        <div class="icon-box mb-0">
          <i class="bi bi-person-circle"></i>
        </div>
        <div class="cabinet-sidebar-user">
          <div class="text-white fw-bold">{{ current_user.name }}</div>
          <div class="text-secondary small mono">{{ current_user.phone }}</div>
          <div class="text-secondary smaller mono">КЛИЕНТСКИЙ ДОСТУП</div>
        </div>
      </div>
    </div>

    <div class="list-group list-group-flush bg-transparent">
      <a href="{{ url_for('cabinet.index') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-white mono py-3 {% if request.endpoint == 'cabinet.index' or request.endpoint == 'cabinet.appointment_detail' %}active{% endif %}">
        <i class="bi bi-grid-1x2 me-2"></i>МОИ ЗАЯВКИ
      </a>
      <a href="{{ url_for('cabinet.telegram') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-white mono py-3 {% if request.endpoint == 'cabinet.telegram' %}active{% endif %}">
        <i class="bi bi-telegram me-2"></i>TELEGRAM
      </a>
      <a href="{{ url_for('booking.step1') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-white mono py-3">
        <i class="bi bi-calendar-plus me-2"></i>НОВАЯ ЗАЯВКА
      </a>
      <a href="{{ url_for('auth.logout') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-danger mono py-3">
        <i class="bi bi-box-arrow-right me-2"></i>ВЫЙТИ
      </a>
    </div>
  </div>
</div>

<div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="cabinetOffcanvas" aria-labelledby="cabinetOffcanvasLabel">
  <div class="offcanvas-header border-bottom border-secondary border-opacity-25">
    <h5 class="offcanvas-title mono" id="cabinetOffcanvasLabel">МЕНЮ</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body p-0">
    <div class="list-group list-group-flush bg-transparent">
      <a href="{{ url_for('cabinet.index') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-white mono py-3">
        <i class="bi bi-grid-1x2 me-2"></i>МОИ ЗАЯВКИ
      </a>
      <a href="{{ url_for('cabinet.telegram') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-white mono py-3">
        <i class="bi bi-telegram me-2"></i>TELEGRAM
      </a>
      <a href="{{ url_for('booking.step1') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-white mono py-3">
        <i class="bi bi-calendar-plus me-2"></i>НОВАЯ ЗАЯВКА
      </a>
      <a href="{{ url_for('auth.logout') }}" class="list-group-item list-group-item-action bg-transparent border-secondary border-opacity-10 text-danger mono py-3">
        <i class="bi bi-box-arrow-right me-2"></i>ВЫЙТИ
      </a>
    </div>
  </div>
</div>
