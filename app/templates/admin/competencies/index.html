{% extends "admin/admin_base.html" %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex align-items-center justify-content-between mb-4 border-bottom border-secondary border-opacity-25 pb-3">
    <div>
      <span class="badge neon-border-blue text-white mono mb-2">SECTIONS_DB.EXE</span>
      <h1 class="h2 m-0 neon-text-blue mono">СПРАВОЧНИК УЧАСТКОВ</h1>
    </div>
    <a href="{{ url_for('admin.competency_edit') }}" class="btn btn-outline-info mono">/добавить_участок</a>
  </div>

  <div class="card bg-dark neon-border-blue shadow-lg">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0 mono small">
          <thead class="text-secondary border-secondary border-opacity-25">
            <tr>
              <th class="ps-4">ID</th>
              <th>НАЗВАНИЕ_УЧАСТКА</th>
              <th class="text-end pe-4">ДЕЙСТВИЯ</th>
            </tr>
          </thead>
          <tbody class="border-secondary border-opacity-10">
            {% for comp in competencies %}
              <tr>
                <td class="ps-4">> {{ comp.id }}</td>
                <td class="text-white fw-bold">{{ comp.title }}</td>
                <td class="text-end pe-4">
                  <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('admin.competency_edit', competency_id=comp.id) }}" class="btn btn-sm btn-outline-info mono">
                      EDIT.CFG
                    </a>
                    <form action="{{ url_for('admin.competency_delete', competency_id=comp.id) }}" method="POST" onsubmit="return confirm('Удалить участок?')">
                      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                      <button type="submit" class="btn btn-sm btn-outline-danger mono">DELETE.EXE</button>
                    </form>
                  </div>
                </td>
              </tr>
            {% else %}
              <tr>
                <td colspan="3" class="text-center py-5 text-secondary">
                  <i class="bi bi-folder-x fs-1 d-block mb-3 opacity-25"></i>
                  <span class="text-secondary">УЧАСТКИ_ОТСУТСТВУЮТ.NULL</span>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
